name: Production Uptime Check

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Check public health endpoint
        env:
          PROD_HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL != '' && secrets.PROD_HEALTHCHECK_URL || 'https://play.hadoop21.click/healthz' }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --max-time 15 \
            --retry 2 --retry-delay 2 --retry-connrefused \
            "$PROD_HEALTHCHECK_URL"

      - name: Check readiness endpoint
        env:
          PROD_READINESS_URL: ${{ secrets.PROD_READINESS_URL != '' && secrets.PROD_READINESS_URL || 'https://play.hadoop21.click/readyz' }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --max-time 15 \
            --retry 2 --retry-delay 2 --retry-connrefused \
            "$PROD_READINESS_URL"

      - name: Check protected service route
        if: ${{ secrets.PROD_PROTECTED_URL != '' && secrets.PROD_BASIC_AUTH_USER != '' && secrets.PROD_BASIC_AUTH_PASSWORD != '' }}
        env:
          PROD_PROTECTED_URL: ${{ secrets.PROD_PROTECTED_URL }}
          PROD_BASIC_AUTH_USER: ${{ secrets.PROD_BASIC_AUTH_USER }}
          PROD_BASIC_AUTH_PASSWORD: ${{ secrets.PROD_BASIC_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --max-time 15 \
            --retry 2 --retry-delay 2 --retry-connrefused \
            -u "${PROD_BASIC_AUTH_USER}:${PROD_BASIC_AUTH_PASSWORD}" \
            "$PROD_PROTECTED_URL"

      - name: Protected route check skipped (missing secrets)
        if: ${{ !(secrets.PROD_PROTECTED_URL != '' && secrets.PROD_BASIC_AUTH_USER != '' && secrets.PROD_BASIC_AUTH_PASSWORD != '') }}
        run: echo "Protected route check skipped: missing PROD_PROTECTED_URL/PROD_BASIC_AUTH_USER/PROD_BASIC_AUTH_PASSWORD"
