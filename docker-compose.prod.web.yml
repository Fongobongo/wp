services:
  web-client:
    build:
      context: .
      dockerfile: Dockerfile.web.prod
    restart: unless-stopped
    expose:
      - "4173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173/"]
      interval: 20s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      web-client:
        condition: service_started
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./infra/prod/Caddyfile.web:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASSWORD_HASH: ${BASIC_AUTH_PASSWORD_HASH}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
